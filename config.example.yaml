# Global configuration
port: 9090

# RPC URLs for different networks (at least one is required)
rpc_url_mainnet: "https://frequent-proud-emerald.solana-mainnet.quiknode.pro/f5de44303e20b929da3c3aa8e95593e04f212534/"
rpc_url_testnet: "https://rough-hidden-asphalt.solana-testnet.quiknode.pro/000b907400ad3fddd760d40328aa06397e21f0c4/"  # Optional
# rpc_url_devnet: "https://api.devnet.solana.com"    # Optional

# Validator configurations per network (at least one validator required)
# You can define multiple validators per network

mainnet_validators:
  - vote_account: "YOUR_MAINNET_VOTE_ACCOUNT_1"
    identity_account: "YOUR_MAINNET_IDENTITY_ACCOUNT_1"
  - vote_account: "YOUR_MAINNET_VOTE_ACCOUNT_2"
    identity_account: "YOUR_MAINNET_IDENTITY_ACCOUNT_2"

# Optional: Multiple validators for testnet
testnet_validators:
  - vote_account: "YOUR_TESTNET_VOTE_ACCOUNT_1"
    identity_account: "YOUR_TESTNET_IDENTITY_ACCOUNT_1"
  - vote_account: "YOUR_TESTNET_VOTE_ACCOUNT_2"
    identity_account: "YOUR_TESTNET_IDENTITY_ACCOUNT_2"
  - vote_account: "YOUR_TESTNET_VOTE_ACCOUNT_3"
    identity_account: "YOUR_TESTNET_IDENTITY_ACCOUNT_3"

# Optional: Single validator for devnet
# devnet_validators:
#   - vote_account: "YOUR_DEVNET_VOTE_ACCOUNT_1"
#     identity_account: "YOUR_DEVNET_IDENTITY_ACCOUNT_1"

# Legacy single-validator format still supported for backward compatibility:
# mainnet_vote_account: "YOUR_MAINNET_VOTE_ACCOUNT_PUBKEY"
# mainnet_identity_account: "YOUR_MAINNET_IDENTITY_ACCOUNT_PUBKEY"